services:
  postgres:
    image: postgres:16
    container_name: retail_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: retail
      POSTGRES_USER: retail_user
      POSTGRES_PASSWORD: retail_password
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retail_user -d retail"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: