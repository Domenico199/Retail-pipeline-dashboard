services:

  # ── Retail PostgreSQL ──────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: retail_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: retail
      POSTGRES_USER: retail_user
      POSTGRES_PASSWORD: retail_password
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retail_user -d retail"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Airflow Metadata PostgreSQL ────────────────────────────
  airflow-metadata:
    image: postgres:16
    container_name: airflow_metadata
    restart: unless-stopped
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    ports:
      - "5435:5432"
    volumes:
      - airflow_metadata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Airflow Init (one-shot) ────────────────────────────────
  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow_init
    depends_on:
      airflow-metadata:
        condition: service_healthy
    environment: &airflow-env
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-metadata:5432/airflow
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      # Retail DB connection (inside Docker network)
      POSTGRES_USER: retail_user
      POSTGRES_PASSWORD: retail_password
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: retail
      SOURCE_PATH: /opt/airflow/data/source
      SOURCE_SYSTEM: simulated_api
    entrypoint: /bin/bash
    command: -c "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true"

  # ── Airflow Webserver ──────────────────────────────────────
  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow_webserver
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment: *airflow-env
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./data:/opt/airflow/data
    command: airflow webserver

  # ── Airflow Scheduler ──────────────────────────────────────
  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow_scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment: *airflow-env
    volumes:
      - ./dags:/opt/airflow/dags
      - ./data:/opt/airflow/data
    command: airflow scheduler

  # ── Superset Metadata PostgreSQL ──────────────────────────
  superset-metadata:
    image: postgres:16
    container_name: superset_metadata
    restart: unless-stopped
    environment:
      POSTGRES_DB: superset
      POSTGRES_USER: superset
      POSTGRES_PASSWORD: superset
    volumes:
      - superset_metadata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U superset -d superset"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Superset Init (one-shot) ──────────────────────────────
  superset-init:
    build:
      context: ./superset
      dockerfile: Dockerfile
    container_name: superset_init
    depends_on:
      superset-metadata:
        condition: service_healthy
    environment: &superset-env
      SUPERSET_SECRET_KEY: "retail-superset-secret-key-change-me"
      SQLALCHEMY_DATABASE_URI: "postgresql+psycopg2://superset:superset@superset-metadata:5432/superset"
    volumes:
      - superset_home:/app/superset_home
      - ./superset/bootstrap.sh:/app/bootstrap.sh
    entrypoint: /bin/bash
    command: /app/bootstrap.sh

  # ── Apache Superset ──────────────────────────────────────
  superset:
    build:
      context: ./superset
      dockerfile: Dockerfile
    container_name: superset
    restart: unless-stopped
    depends_on:
      superset-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment: *superset-env
    ports:
      - "8088:8088"
    volumes:
      - superset_home:/app/superset_home

volumes:
  postgres_data:
  airflow_metadata:
  superset_metadata:
  superset_home:
